<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Embeddable map</title>
    <meta name="viewport" content="width=device-width, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    <link rel="stylesheet" href="/static/font.css">
    <link rel="stylesheet" href="/static/tokens.css">
    <link rel="stylesheet" href="/static/embed_map_style.css">
    <!-- FONTS -->
   <link rel="preload" href="static/fonts/Inter-Regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="static/fonts/Inter-Italic.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="static/fonts/EBGaramond-Regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="static/fonts/EBGaramond-Italic.woff2" as="font" type="font/woff2" crossorigin>

     <!-- Make sure you put this AFTER Leaflet's CSS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
    <script type="application/json" id="poi-data">
        {{poi_json | tojson }}
    </script>
    <script type="application/json" id="coords">
        {{coords | tojson}}
    </script>
</head>
<body>
        <div class="container" id="showable-content">
            <div class="container">
                <p>Navetta</p>
            </div>
            <div class="map-wrapper">
                <div id="map">
                </div>
                <div class="overlay-info">
                    <p>Servizio non disponibile</p>
                </div>
            </div>
            <div class="container" id="info">
                <p>Prossima fermata: lorem ipsum dolor</p>
            </div>
</div>
<script src="/static/embed_map.js"></script>
<script> map_init() </script>
</body>
</html>
